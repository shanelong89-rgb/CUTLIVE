kind = "mobile"
previewPath = "/cultive-mobile/"
title = "CULTIVE Mobile"
version = "1.0.0"
id = "artifacts/cultive-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/cultive-mobile/" ]
localPort = 21357

[services.development]
run = "pnpm --filter @workspace/cultive-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cultive-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cultive-mobile", "run", "serve" ]

[services.env]
PORT = "21357"
BASE_PATH = "/cultive-mobile/"
